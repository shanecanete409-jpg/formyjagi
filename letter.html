<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter</title>
  <style>
    /* ✅ Page Background */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom right, #ffd6e8, #cce7ff); /* Pink + Blue gradient */
      color: #333;
    }

    /* ✅ Letter Container */
    .letter-container {
      max-width: 700px;
      margin: 50px auto;
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      line-height: 1.8;
      font-size: 18px;
    }

    /* ✅ Header for Letter */
    .letter-header {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #ff5fa2; /* pink accent */
    }

    /* ✅ Paragraph Styles */
    .letter-container p {
      text-align: justify;
      margin-bottom: 20px;
    }

    /* ✅ Footer (optional sender) */
    .letter-footer {
      text-align: right;
      font-style: italic;
      margin-top: 40px;
      color: #5f5fff; /* blue accent */
    }
  </style>
</head>

<body>

  <div class="letter-container">
    <div class="letter-header">
      To Someone Special
    </div>

    <p>
      伝えたいことがたくさんあるのに、言葉にしようとすると  
      いつも心が思考よりも強く語りかけてくる。
    

    
      それでも伝えたい——  
      あなたは予想もしなかった存在なのに、  
      いつの間にか私にとって必要不可欠な人になっていた。
    

    
      あなたが私の人生に現れた瞬間、何かが変わった。  
      あなたは家のように暖かいものをくれて、  
      静かな日々でさえ特別にしてくれた。
    

    
      恋に落ちるつもりなんてなかったのに、  
      心は頭より先にあなたを選んでいたんだと気づいた。
    </p>

    <div class="letter-footer">
      Yours truly,<br>
      Shane
    </div>
  </div>

</body>
</html>
