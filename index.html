<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT'S ALWAYS YOU</title>
  <link rel="stylesheet" href="Webpage.css">

  <style>
    /* ==============================
       PAGE BACKGROUND
    ============================== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', Helvetica, sans-serif;
      background: linear-gradient(to bottom right, #ffabc7, #ff85da);
      color: #000;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ==============================
       HEADER
    ============================== */
    .header {
      text-align: center;
      padding: 25px 0;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      font-size: 2.5rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    /* ==============================
       NAVIGATION MENU
    ============================== */
    .menu {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 15px 0;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-radius: 0 0 15px 15px;
      margin-bottom: 30px;
    }

    .menu a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 8px 15px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .menu a:hover {
      background: #fff;
      color: #cf8fbc;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    /* ==============================
       LETTER / TEXT BOX
    ============================== */
    .box {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    .pattern-description {
      max-width: 700px;
      width: 90%;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      padding: 40px;
      font-size: 18px;
      line-height: 1.9;
      text-align: justify;
      color: #333;
    }

    .pattern-description em {
      color: #f566ca;
      font-style: italic;
    }

    /* ==============================
       FOOTER
    ============================== */
    .footer {
      text-align: center;
      padding: 30px 0;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 -4px 8px rgba(0,0,0,0.1);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;sss
      font-size: 14px;
      color: #333;
    }

    /* ==============================
       📱 MOBILE (DIKIT-DIKIT MENU)
    ============================== */
    @media (max-width: 600px) {

      .header {
        font-size: 1.6rem;
        padding: 12px;
      }

      .menu {
        flex-direction: column;
        gap: 3px; /* mas dikit */
        padding: 8px 0;
      }

      .menu a {
        display: block;
        width: 90%;
        margin: 2px auto;
        text-align: center;
        font-size: 0.95rem;
        padding: 6px 10px;
      }

      .pattern-description {
        padding: 18px;
        font-size: 15px;
      }

      .box {
        margin-bottom: 15px;
        padding: 0 8px;
      }

      .footer {
        font-size: 11px;
        padding: 15px;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    ABOUT HER
  </div>

  <!-- NAVIGATION MENU -->
  <nav class="menu">
    <a href="Musiclyrics.html">Musiclyrics</a>
    <a href="Cutiepie.html">Gallery</a>
    <a href="letter.html">Letter</a>
    <a href="love1.html">💙</a>
    <a href="scan.html">SCAN ME</a>
  </nav>

  <!-- LETTER / TEXT -->
  <div class="box">
    <section class="pattern-description">
      She looks like something poet write about
    </section>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    &copy; WLW
  </div>

</body>
</html>
